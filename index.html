<script>
// ═══════════════════════════════════════════════════════════════
// SÜRÜ MODÜLÜ — Tam Algoritma
// ═══════════════════════════════════════════════════════════════

// ─── SABITLER ────────────────────────────────────────────────
const GESTATION_DAYS = 280;
const DRY_PERIOD = 60;
const HEAT_MIN = 18, HEAT_MAX = 24;
const OPEN_WARN_1 = 80;   // doğum sonrası kızgınlık bekle
const OPEN_WARN_2 = 100;  // tohumlama gecikiyor
const PREG_CHECK_DAY = 35; // gebelik kontrolü

const ANIMAL_STATUS = {
  open:    {label:'Açık',     icon:'🟡', color:'amber'},
  pregnant:{label:'🤰 Gebe',  icon:'🤰', color:'green'},
  dry:     {label:'🛑 Kuru',  icon:'🛑', color:'gray'},
  heifer:  {label:'Düve',     icon:'🐄', color:'blue'},
  sold:    {label:'Satıldı',  icon:'💰', color:'gray'},
  dead:    {label:'Öldü',     icon:'💀', color:'gray'},
};

const BREEDS = {
  holstein:'Holstein', simental:'Simental', montofon:'Montofon', other:'Diğer'
};
const BREED_ICONS = {
  holstein:'🐄', simental:'🐂', montofon:'🐮', other:'🐄'
};

const EVENT_TYPES = {
  insemination:    {label:'Tohumlama',        icon:'💉', color:'blue'},
  heat:            {label:'Kızgınlık',         icon:'🔥', color:'red'},
  pregnancy_check: {label:'Gebelik Kontrolü', icon:'🔬', color:'purple'},
  birth:           {label:'Buzağılama',            icon:'🐣', color:'green'},
  dry_off:         {label:'Kuruya Alma',       icon:'🛑', color:'amber'},
  vaccination:     {label:'Aşılama',           icon:'💊', color:'blue'},
  disease:         {label:'Hastalık',          icon:'🤒', color:'red'},
  treatment:       {label:'Tedavi',            icon:'🩺', color:'amber'},
  milk:            {label:'Süt Ölçümü',        icon:'🥛', color:'green'},
  other:           {label:'Diğer',             icon:'📝', color:'gray'},
};

// Hastalık durumları
const DISEASE_STATUS = {
  active:    {label:'Aktif',      icon:'🔴', color:'red'},
  recovered: {label:'İyileşti',   icon:'🟢', color:'green'},
  chronic:   {label:'Kronik',     icon:'🟠', color:'amber'},
  died:      {label:'Öldü',       icon:'⚫', color:'gray'},
};

// Temel sığır hastalıkları listesi
const DISEASE_LIST = [
  // Meme hastalıkları
  {cat:'🐄 Meme',      name:'Mastitis (Klinik)'},
  {cat:'🐄 Meme',      name:'Mastitis (Subklinik)'},
  // Üreme
  {cat:'🔴 Üreme',     name:'Metritis'},
  {cat:'🔴 Üreme',     name:'Endometritis'},
  {cat:'🔴 Üreme',     name:'Kistik Over'},
  {cat:'🔴 Üreme',     name:'Plasenta Tutukluğu'},
  {cat:'🔴 Üreme',     name:'Prolapsus Uteri'},
  {cat:'🔴 Üreme',     name:'Distosi (Zor Doğum)'},
  // Metabolik
  {cat:'⚡ Metabolik', name:'Hipokalsemi (Süt Humması)'},
  {cat:'⚡ Metabolik', name:'Ketozis (Asetoni)'},
  {cat:'⚡ Metabolik', name:'Hipomagnezeми'},
  {cat:'⚡ Metabolik', name:'Şirden Deplasmanı (Sol)'},
  {cat:'⚡ Metabolik', name:'Şirden Deplasmanı (Sağ)'},
  {cat:'⚡ Metabolik', name:'Rumen Asidozu'},
  {cat:'⚡ Metabolik', name:'Rumen Timpanisi (Şişme)'},
  // Ayak
  {cat:'🦶 Ayak',      name:'Topallık (Genel)'},
  {cat:'🦶 Ayak',      name:'Dijital Dermatit'},
  {cat:'🦶 Ayak',      name:'Beyaz Çizgi Hastalığı'},
  {cat:'🦶 Ayak',      name:'Tırnak Çürüklüğü'},
  {cat:'🦶 Ayak',      name:'Sole Ülser'},
  // Solunum
  {cat:'🫁 Solunum',   name:'Pnömoni'},
  {cat:'🫁 Solunum',   name:'Akciğer Enfeksiyonu'},
  // Sindirim
  {cat:'🫃 Sindirim',  name:'İshal'},
  {cat:'🫃 Sindirim',  name:'Karın Zarı İltihabı'},
  {cat:'🫃 Sindirim',  name:'İnvaginasyon'},
  // Enfeksiyöz
  {cat:'🦠 Enfeksiyöz',name:'BVD (Viral İshal)'},
  {cat:'🦠 Enfeksiyöz',name:'IBR (Enfeksiyöz Rinotrakeit)'},
  {cat:'🦠 Enfeksiyöz',name:'Brucellosis'},
  {cat:'🦠 Enfeksiyöz',name:'Tüberküloz'},
  {cat:'🦠 Enfeksiyöz',name:'Şap Hastalığı'},
  {cat:'🦠 Enfeksiyöz',name:'Leptospiroz'},
  // Diğer
  {cat:'📋 Diğer',     name:'Yaralanma / Travma'},
  {cat:'📋 Diğer',     name:'Zehirlenme'},
  {cat:'📋 Diğer',     name:'Gözlem / Muayene'},
];

// ─── HELPERS ─────────────────────────────────────────────────
const daysBetween = (d1, d2) => {
  if(!d1 || !d2 || d1==='' || d2==='') return 0;
  const t1 = new Date(d1).getTime(), t2 = new Date(d2).getTime();
  if(isNaN(t1) || isNaN(t2)) return 0;
  return Math.round((t2 - t1) / 86400000);
};
const addDays = (d, n) => {
  if(!d || d === '' || isNaN(new Date(d).getTime())) return null;
  const dt = new Date(d); dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0,10);
};
const ageStr = (bd) => {
  if(!bd) return '-';
  const d = daysBetween(bd, today());
  if(d < 0) return '-';
  if(d < 30) return d + ' gün';
  if(d < 365) return Math.floor(d/30) + ' ay';
  const y = Math.floor(d/365), m = Math.floor((d%365)/30);
  return y + 'y' + (m ? ' ' + m + 'a' : '');
};
const fmtEarTag = (v) => {
  if(!v) return '';
  const c = v.toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(c.startsWith('TR') && c.length > 2) {
    const r = c.slice(2);
    return r.length > 2 ? 'TR-' + r.slice(0,2) + '-' + r.slice(2) : 'TR-' + r;
  }
  return v.toUpperCase();
};
window.formatEarTag = fmtEarTag;

// ─── FARM DATA OPS ───────────────────────────────────────────
async function loadFarmData() {
  try {
    [farms, animals, animalEvents] = await Promise.all([
      sbReq('GET', 'vc_farms?user_id=eq.' + userId() + '&order=owner_name.asc'),
      sbReq('GET', 'vc_animals?user_id=eq.' + userId() + '&order=ear_tag.asc'),
      sbReq('GET', 'vc_animal_events?user_id=eq.' + userId() + '&order=event_date.desc'),
    ]);
  } catch(e) {
    console.error('Farm yükleme hatası:', e);
    farms = []; animals = []; animalEvents = [];
  }
}

async function addFarm(f) {
  try {
    const r = await sbReq('POST','vc_farms',{...f, id:uid(), user_id:userId(), created_at:new Date().toISOString()});
    farms = [...farms, ...(Array.isArray(r)?r:[r])];
    farms.sort((a,b) => (a.owner_name||'').localeCompare(b.owner_name||'', 'tr'));
  } catch(e) { alert('İşletme eklenemedi: ' + e.message); }
}

async function updateFarm(id, upd) {
  try { await sbReq('PATCH','vc_farms?id=eq.'+id, upd); }
  catch(e) { console.error(e); }
  farms = farms.map(f => f.id===id ? {...f,...upd} : f);
}

async function deleteFarm(id) {
  const animalIds = animals.filter(a => a.farm_id===id).map(a => a.id);
  try {
    if(animalIds.length) {
      await sbReq('DELETE', 'vc_animal_events?animal_id=in.(' + animalIds.join(',') + ')');
      await sbReq('DELETE', 'vc_animals?farm_id=eq.' + id);
    }
    await sbReq('DELETE', 'vc_farms?id=eq.' + id);
  } catch(e) { console.error(e); }
  animalEvents = animalEvents.filter(e => !animalIds.includes(e.animal_id));
  animals = animals.filter(a => a.farm_id !== id);
  farms = farms.filter(f => f.id !== id);
}

async function addAnimal(a) {
  try {
    const r = await sbReq('POST','vc_animals',{...a, id:uid(), user_id:userId(), created_at:new Date().toISOString()});
    const saved = Array.isArray(r) ? r[0] : r;
    animals = [...animals, saved];
    return saved;
  } catch(e) { alert('Hayvan eklenemedi: ' + e.message); return null; }
}

async function updateAnimal(id, upd) {
  try { await sbReq('PATCH','vc_animals?id=eq.'+id, upd); }
  catch(e) { console.error(e); }
  animals = animals.map(a => a.id===id ? {...a,...upd} : a);
}

async function deleteAnimal(id) {
  try {
    await sbReq('DELETE', 'vc_animal_events?animal_id=eq.' + id);
    await sbReq('DELETE', 'vc_animals?id=eq.' + id);
  } catch(e) { console.error(e); }
  animalEvents = animalEvents.filter(e => e.animal_id !== id);
  animals = animals.filter(a => a.id !== id);
}

async function addAnimalEvent(ev) {
  try {
    const r = await sbReq('POST','vc_animal_events',{...ev, id:uid(), user_id:userId(), created_at:new Date().toISOString()});
    const saved = Array.isArray(r) ? r[0] : r;
    animalEvents = [saved, ...animalEvents];
    return saved;
  } catch(e) { console.error(e); return null; }
}

// ─── UYARI ALGORİTMASI ───────────────────────────────────────
function getAnimalAlerts(animal) {
  const alerts = [];
  const evs = animalEvents.filter(e => e.animal_id === animal.id);
  const tdStr = today();
  const status = animal.status;

  // ── Olayları sırala ──
  const inseminations = evs.filter(e=>e.event_type==='insemination').sort((a,b)=>b.event_date.localeCompare(a.event_date));
  const heats         = evs.filter(e=>e.event_type==='heat').sort((a,b)=>b.event_date.localeCompare(a.event_date));
  const births        = evs.filter(e=>e.event_type==='birth').sort((a,b)=>b.event_date.localeCompare(a.event_date));
  const pregChecks    = evs.filter(e=>e.event_type==='pregnancy_check').sort((a,b)=>b.event_date.localeCompare(a.event_date));
  const dryOffs       = evs.filter(e=>e.event_type==='dry_off').sort((a,b)=>b.event_date.localeCompare(a.event_date));

  const lastInsem     = inseminations[0] || null;
  const lastHeat      = heats[0] || null;
  const lastBirth     = births[0] || null;
  const lastPregCheck = pregChecks[0] || null;
  const lastDryOff    = dryOffs[0] || null;

  // ── Beklenen doğum hesapla (her durumda gerekli) ──
  let expectedBirth = animal.expected_birth_date || null;
  if(!expectedBirth && lastPregCheck && lastInsem) {
    const pd = animal.pregnancy_check_day || daysBetween(lastInsem.event_date, lastPregCheck.event_date);
    expectedBirth = addDays(lastPregCheck.event_date, GESTATION_DAYS - pd);
  } else if(!expectedBirth && lastInsem) {
    expectedBirth = addDays(lastInsem.event_date, GESTATION_DAYS);
  }

  // ══════════════════════════════════════════════════
  // DÜVE ALGORİTMASI
  // ══════════════════════════════════════════════════
  if(status === 'heifer' && animal.birth_date) {
    const ageDays   = daysBetween(animal.birth_date, tdStr);
    const ageMonths = Math.floor(ageDays / 30);

    if(ageMonths >= 10 && ageMonths < 12 && !lastInsem) {
      alerts.push({priority:2, type:'blue', icon:'📅',
        title:'Tohumlamaya Hazırlan',
        detail:`Düve ${ageMonths} aylık — 12. ayda tohumlama planlanabilir`});
    }
    if(ageMonths >= 12 && !lastInsem) {
      alerts.push({priority:1, type:'amber', icon:'💉',
        title:'Tohumlama Zamanı',
        detail:`Düve ${ageMonths} aylık — tohumlama yapılmalı`});
    }
  }

  // ══════════════════════════════════════════════════
  // TOHUMLAMA SONRASI TAKİP (Açık + Düve)
  // ══════════════════════════════════════════════════
  if((status === 'open' || status === 'heifer') && lastInsem) {
    const dSinceInsem = daysBetween(lastInsem.event_date, tdStr);
    const insemNo     = inseminations.length; // kaçıncı tohumlama

    // 3+ başarısız tohumlama
    if(insemNo >= 3 && !pregChecks.some(p => p.event_date > lastInsem.event_date)) {
      alerts.push({priority:0, type:'red', icon:'🔴',
        title:`Reprodüktif Sorun Olabilir`,
        detail:`${insemNo}. tohumlama — gebelik teyidi yok, veteriner değerlendirmesi gerekli`});
    }

    // 35. gün gebelik kontrolü
    const hasCheckAfterInsem = pregChecks.some(p => p.event_date > lastInsem.event_date);
    if(!hasCheckAfterInsem) {
      if(dSinceInsem >= 33 && dSinceInsem <= 42) {
        alerts.push({priority:1, type:'purple', icon:'🔬',
          title:`Gebelik Kontrolü (${insemNo}. Tohumlama)`,
          detail:`Tohumlamadan ${dSinceInsem} gün geçti — 35. gün kontrol zamanı`});
      }
      if(dSinceInsem > 42) {
        alerts.push({priority:1, type:'red', icon:'⚠️',
          title:'Gebelik Kontrolü Yapılmadı',
          detail:`Tohumlamadan ${dSinceInsem} gün geçti — kontrol gecikmiş`});
      }
      // 40+ gün, kızgınlık yok → gebe mi, gizli kızgınlık mı?
      if(dSinceInsem >= 40) {
        const heatAfterInsem40 = heats.find(h => h.event_date > lastInsem.event_date);
        if(!heatAfterInsem40) {
          alerts.push({priority:1, type:'amber', icon:'🤔',
            title:'Gebe mi? Gizli Kızgınlık mı?',
            detail:`${dSinceInsem} gündür kızgınlık görülmedi — gebelik muayenesi yapılarak netleştirilmeli`});
        }
      }
    } else if(hasCheckAfterInsem && status !== 'pregnant') {
      // Gebelik kontrolü yapıldı ama hayvan gebe işaretlenmedi
      alerts.push({priority:1, type:'purple', icon:'❓',
        title:'Gebelik Kontrol Sonucu Girilmedi',
        detail:`Kontrol yapıldı — hayvanın durumunu (Gebe/Açık) güncelleyin`});
    }

    // Tohumlama sonrası 18-24. günde kızgınlık = tohum tutmadı
    const heatAfterInsem = heats.find(h => h.event_date > lastInsem.event_date);
    if(heatAfterInsem) {
      const dHeat = daysBetween(lastInsem.event_date, heatAfterInsem.event_date);
      if(dHeat >= HEAT_MIN && dHeat <= HEAT_MAX) {
        alerts.push({priority:0, type:'red', icon:'🔥',
          title:'Tohum Tutmadı Olabilir',
          detail:`${insemNo}. tohumlamadan ${dHeat} gün sonra kızgınlık — gebelik muayenesi şart`});
      }
      // 2. tohumlama 30-40+ gün sonrası kızgınlık = embriyonik/fetal ölüm
      if(dHeat > 30 && insemNo >= 2) {
        alerts.push({priority:0, type:'red', icon:'⚠️',
          title:'Embriyonik/Fetal Ölüm Olabilir',
          detail:`${insemNo}. tohumlamadan ${dHeat} gün sonra kızgınlık — embriyonik kayıp şüphesi, veteriner değerlendirmesi gerekli`});
      }
    } else {
      // Kızgınlık takip penceresi henüz açık
      const wStart = addDays(lastInsem.event_date, HEAT_MIN);
      const wEnd   = addDays(lastInsem.event_date, HEAT_MAX);
      if(tdStr >= wStart && tdStr <= wEnd) {
        alerts.push({priority:1, type:'amber', icon:'👀',
          title:'Kızgınlık Takip Penceresi',
          detail:`${insemNo}. tohumlama sonrası ${HEAT_MIN}-${HEAT_MAX}. gün — kızgınlık izle (${fmtDate(wStart)}–${fmtDate(wEnd)})`});
      }
    }
  }

  // ══════════════════════════════════════════════════
  // KIZGINLIK TAKİBİ (tohumlama olmayan açık/düve)
  // ══════════════════════════════════════════════════
  if((status === 'open' || status === 'heifer') && lastHeat &&
     (!lastInsem || lastHeat.event_date > lastInsem.event_date)) {
    const nextStart = addDays(lastHeat.event_date, HEAT_MIN);
    const nextEnd   = addDays(lastHeat.event_date, HEAT_MAX);
    const dLeft     = daysBetween(tdStr, nextStart);

    if(tdStr >= nextStart && tdStr <= nextEnd) {
      alerts.push({priority:1, type:'red', icon:'🔥',
        title:'Kızgınlık Bekleniyor',
        detail:`Son kızgınlıktan ${daysBetween(lastHeat.event_date, tdStr)} gün — pencere: ${fmtDate(nextStart)}–${fmtDate(nextEnd)}`});
    } else if(dLeft > 0 && dLeft <= 5) {
      alerts.push({priority:2, type:'amber', icon:'⏰',
        title:'Kızgınlık Yaklaşıyor',
        detail:`${dLeft} gün sonra kızgınlık penceresi başlıyor (${fmtDate(nextStart)})`});
    }
  }

  // ══════════════════════════════════════════════════
  // DOĞUM SONRASI AÇIK İNEK
  // ══════════════════════════════════════════════════
  if(status === 'open' && lastBirth) {
    const dSinceBirth = daysBetween(lastBirth.event_date, tdStr);

    // 0-30 gün: Postpartum — hastalıklara açık dönem
    if(dSinceBirth >= 0 && dSinceBirth <= 30) {
      alerts.push({priority:2, type:'blue', icon:'🩺',
        title:'Postpartum Dönem — Dikkatli Olun',
        detail:`Doğumdan ${dSinceBirth} gün — hastalıklara açık dönem, sıkı takip yapın`});
    }

    // 80. gün: kızgınlık bekle (tohumlama yoksa)
    if(dSinceBirth >= OPEN_WARN_1 && dSinceBirth < OPEN_WARN_2 && !lastInsem) {
      alerts.push({priority:1, type:'amber', icon:'👀',
        title:'Kızgınlık Bekle',
        detail:`Doğumdan ${dSinceBirth} gün — kızgınlık gözlemlenebilir, tohumlama hazırlığı`});
    }

    // 100. gün: tohumlama gecikiyor + sorunlu inek
    if(dSinceBirth >= OPEN_WARN_2 && !lastInsem) {
      alerts.push({priority:0, type:'red', icon:'💉',
        title:'⚠️ Tohumlama Gecikiyor — Sorunlu İnek',
        detail:`Doğumdan ${dSinceBirth} gün geçti — tohumlama yapılmadı, müdahale gerekli`});
    }
  }

  // ══════════════════════════════════════════════════
  // GEBE İNEK ALGORİTMASI
  // ══════════════════════════════════════════════════
  if(status === 'pregnant') {

    // Gebelik muayenesi uyarısı (tohumlama var ama teyit yok)
    if(lastInsem && !lastPregCheck) {
      const dSinceInsem = daysBetween(lastInsem.event_date, tdStr);
      if(dSinceInsem >= 33 && dSinceInsem <= 42) {
        alerts.push({priority:1, type:'purple', icon:'🔬',
          title:'Gebelik Muayenesi Yapılsın',
          detail:`Tohumlamadan ${dSinceInsem} gün — teyit tarihi girilmemiş`});
      }
    }

    // Teyit sonrası kızgınlık = tohum tutmadı
    if(lastPregCheck && lastHeat && lastHeat.event_date > lastPregCheck.event_date) {
      alerts.push({priority:0, type:'red', icon:'🔥',
        title:'Tohum Tutmadı — Muayene Şart',
        detail:`Gebelik teyidinden sonra kızgınlık görüldü — tekrar muayene gerekli`});
    }

    if(expectedBirth) {
      const dToCalve = daysBetween(tdStr, expectedBirth);

      // Kuruya alma: doğuma 50 gün kaldı, hala kuruya alınmadı
      if(dToCalve <= 50 && dToCalve > 0 && !lastDryOff) {
        alerts.push({priority:0, type:'red', icon:'🛑',
          title:'Kuruya Alınmadı — Risk Altında!',
          detail:`Doğuma ${dToCalve} gün kaldı — hayvan hâlâ sağılıyor, acil kuruya alın`});
      }
      // 60 gün erken uyarı
      if(dToCalve > 50 && dToCalve <= 60 && !lastDryOff) {
        alerts.push({priority:1, type:'amber', icon:'🛑',
          title:'Kuruya Alma Zamanı',
          detail:`Doğuma ${dToCalve} gün kaldı — kuruya alma planlanmalı`});
      }

      // Doğum yaklaşıyor: son 15 gün
      if(dToCalve > 5 && dToCalve <= 15) {
        alerts.push({priority:0, type:'purple', icon:'🐣',
          title:'Doğum Yakın',
          detail:`Doğuma ${dToCalve} gün kaldı (${fmtDate(expectedBirth)})`});
      }
      // Doğum zamanı: 0-5 gün
      if(dToCalve >= 0 && dToCalve <= 5) {
        alerts.push({priority:0, type:'red', icon:'🚨',
          title:'DOĞUM ZAMANI!',
          detail:`Beklenen doğum: ${fmtDate(expectedBirth)} — yakın takip`});
      }
      // Doğum geçti
      if(dToCalve < 0) {
        alerts.push({priority:0, type:'red', icon:'🚨',
          title:'Doğum Tarihi Geçti',
          detail:`${Math.abs(dToCalve)} gün gecikmeli — acil kontrol`});
      }

      // 265. gün hazırlan (kuruya alındıysa bile)
      const dPreg = daysBetween(lastInsem?.event_date || tdStr, tdStr);
      if(dPreg >= 260 && dPreg < 270) {
        alerts.push({priority:2, type:'amber', icon:'📋',
          title:'Doğuma Hazırlan',
          detail:`Gebelik ${dPreg}. gün — doğum hazırlığı başlat`});
      }
      if(dPreg >= 270 && dPreg < 280 && dToCalve > 5) {
        alerts.push({priority:1, type:'purple', icon:'📋',
          title:'Doğum Yaklaşıyor',
          detail:`Gebelik ${dPreg}. gün — doğum hazırlığı tamamlansın`});
      }
    }
  }

  // ══════════════════════════════════════════════════
  // KURU İNEK ALGORİTMASI
  // ══════════════════════════════════════════════════
  if(status === 'dry') {

    // Beklenen doğuma göre uyarı (kuruya alınma tarihinden değil!)
    if(expectedBirth) {
      const dToCalve = daysBetween(tdStr, expectedBirth);

      // Doğuma 50 gün kala hala kuruya alınmamış (gebe iken uyarı verildiyse burada tekrar)
      // Bu aşamada kuru olduğu için bu kontrol geçerli değil

      // Son 10 gün: doğum yaklaşıyor
      if(dToCalve >= 0 && dToCalve <= 10) {
        alerts.push({priority:0, type:'purple', icon:'🐣',
          title:'Doğum Yaklaşıyor',
          detail:`Beklenen buzağılama: ${fmtDate(expectedBirth)} — ${dToCalve} gün kaldı`});
      }
      // Doğum geçti
      if(dToCalve < 0) {
        alerts.push({priority:0, type:'red', icon:'🚨',
          title:'Doğum Tarihi Geçti',
          detail:`${Math.abs(dToCalve)} gün gecikmeli — acil kontrol`});
      }
    } else if(lastDryOff) {
      // Beklenen doğum tarihi yoksa kuruya alma tarihinden 60 gün tahmini
      const dSinceDry = daysBetween(lastDryOff.event_date, tdStr);
      if(dSinceDry >= 50 && dSinceDry < 60) {
        alerts.push({priority:1, type:'amber', icon:'🐣',
          title:'Doğum Yaklaşıyor (Tahmini)',
          detail:`Kuruya alınalı ${dSinceDry} gün — tohumlama tarihi girilmemiş`});
      }
      if(dSinceDry >= 60) {
        alerts.push({priority:0, type:'red', icon:'🚨',
          title:'Doğum Bekleniyor',
          detail:`Kuruya alınalı ${dSinceDry} gün — doğum tarihi belirsiz, kontrol edin`});
      }
    }
  }

  // Önceliğe göre sırala (0 en kritik)
  alerts.sort((a,b) => a.priority - b.priority);
  return alerts;
}

// ─── FARM PAGES ──────────────────────────────────────────────
function buildFarmModule() {
  if(farmNav === 'farm-detail') return buildFarmDetail();
  if(farmNav === 'animal-detail') return buildAnimalDetail();
  return buildFarmList();
}

function buildFarmList() {
  const activeAnimals = animals.filter(a => !['sold','dead'].includes(a.status));
  const alertAnimals = activeAnimals.filter(a => getAnimalAlerts(a).length > 0);
  const pregnantCount = activeAnimals.filter(a => a.status === 'pregnant').length;

  // Filtrele
  let filteredFarms = [...farms];
  if(farmSearch) filteredFarms = filteredFarms.filter(f =>
    (f.owner_name||'').toLowerCase().includes(farmSearch.toLowerCase()) ||
    animals.some(a => a.farm_id===f.id && a.ear_tag.toLowerCase().includes(farmSearch.toLowerCase()))
  );
  if(farmFilter==='alert')    filteredFarms=filteredFarms.filter(f=>animals.filter(a=>a.farm_id===f.id).some(a=>getAnimalAlerts(a).length>0));
  if(farmFilter==='pregnant') filteredFarms=filteredFarms.filter(f=>animals.some(a=>a.farm_id===f.id&&a.status==='pregnant'));
  if(farmFilter==='dry')      filteredFarms=filteredFarms.filter(f=>animals.some(a=>a.farm_id===f.id&&a.status==='dry'));
  if(farmFilter==='heifer')   filteredFarms=filteredFarms.filter(f=>animals.some(a=>a.farm_id===f.id&&a.status==='heifer'));

  const showBar = farmSearch||farmFilter!=='all';

  return `
  <div class="stats-grid">
    <div class="stat-card sc-green"><div class="lbl">İşletme</div><div class="val">${farms.length}</div></div>
    <div class="stat-card sc-blue"><div class="lbl">Aktif Hayvan</div><div class="val">${activeAnimals.length}</div></div>
    <div class="stat-card sc-red"><div class="lbl">Uyarılı</div><div class="val">${alertAnimals.length}</div></div>
    <div class="stat-card sc-amber"><div class="lbl">Gebe</div><div class="val">${pregnantCount}</div></div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn-p" id="add-farm-btn" style="font-size:13px;flex:2">🏭 Yeni İşletme</button>
    <button class="btn-sm btn-sm-b" id="farm-search-btn" style="padding:10px 14px">🔍</button>
  </div>

  <div id="farm-search-bar" style="${showBar?'':'display:none'};margin-bottom:10px">
    <div class="search-bar" style="margin-bottom:8px">
      <span class="search-icon">🔍</span>
      <input class="fi" id="farm-name-search" placeholder="İşletme adı veya küpe no ara..." value="${farmSearch}">
    </div>
    <div class="chip-row">
      ${[['all','Tümü'],['alert','⚠️ Uyarılı'],['pregnant','🤰 Gebeli'],['dry','🛑 Kurulu'],['heifer','🐄 Düveli']].map(([k,l])=>
        `<div class="chip ${farmFilter===k?'active':''}" data-farmfilter="${k}">${l}</div>`).join('')}
    </div>
  </div>

  ${filteredFarms.length ? filteredFarms.map(f => {
    const fa = animals.filter(a => a.farm_id === f.id);
    const active = fa.filter(a => !['sold','dead'].includes(a.status));
    const aw = active.filter(a => getAnimalAlerts(a).length > 0).length;
    const pr = active.filter(a => a.status === 'pregnant').length;
    const ky = active.filter(a => a.status === 'dry').length;
    return `<div class="farm-card" data-farmid="${f.id}">
      <div class="fc-header">
        <div class="fc-av">🏭</div>
        <div class="fc-info">
          <div class="fc-name">${f.owner_name || 'İsimsiz'}</div>
          <div class="fc-meta">${f.farm_no?'No: '+f.farm_no+' · ':''}${f.phone||''}</div>
        </div>
      </div>
      <div class="fc-stats">
        <div class="fc-stat">${active.length} aktif hayvan</div>
        ${pr?`<div class="fc-stat green">🤰 ${pr} gebe</div>`:''}
        ${ky?`<div class="fc-stat amber">🛑 ${ky} kuru</div>`:''}
        ${aw?`<div class="fc-stat red">⚠️ ${aw} uyarı</div>`:''}
      </div>
    </div>`;
  }).join('') : `<div class="empty"><div class="eicon">🏭</div><p>${showBar?'Sonuç bulunamadı':'Henüz işletme yok'}</p></div>`}`;
}

function buildAnimalSearchResults() {
  const q = animalSearch.toLowerCase();
  const res = animals.filter(a =>
    a.ear_tag.toLowerCase().includes(q) ||
    (farms.find(f => f.id === a.farm_id)?.owner_name || '').toLowerCase().includes(q)
  );
  if(!res.length) return `<div class="empty"><div class="eicon">🔍</div><p>Sonuç bulunamadı</p></div>`;
  return `<div class="sec-title">🔍 Arama Sonuçları (${res.length})</div>` + res.map(a => buildAnimalCard(a)).join('');
}

function buildFarmDetail() {
  const farm = farms.find(f => f.id === selectedFarmId);
  if(!farm) return '<p style="padding:20px">İşletme bulunamadı</p>';

  let fa = animals.filter(a => a.farm_id === selectedFarmId);
  if(animalFilterStatus !== 'all') fa = fa.filter(a => a.status === animalFilterStatus);
  if(animalFilterBreed !== 'all') fa = fa.filter(a => a.breed === animalFilterBreed);
  if(animalFilterAlert !== 'all') {
    fa = fa.filter(a => {
      const alerts = getAnimalAlerts(a);
      const titles = alerts.map(al => al.title);
      switch(animalFilterAlert) {
        case 'no-alert': return alerts.length === 0;
        case 'any-alert': return alerts.length > 0;
        case 'heifer-ready': return titles.some(t=>t.includes('Tohumlama Zamanı')||t.includes('Hazırlan'));
        case 'preg-check': return titles.some(t=>t.includes('Gebelik Kontrolü')&&!t.includes('Yapılmadı')&&!t.includes('Sonucu'));
        case 'preg-check-late': return titles.some(t=>t.includes('Yapılmadı'));
        case 'hidden-heat': return titles.some(t=>t.includes('Gebe mi'));
        case 'preg-result': return titles.some(t=>t.includes('Sonucu Girilmedi'));
        case 'heat-window': return titles.some(t=>t.includes('Kızgınlık Takip')||t.includes('Kızgınlık Penceresi'));
        case 'heat-expected': return titles.some(t=>t.includes('Kızgınlık Bekleniyor')||t.includes('Kızgınlık Yaklaşıyor'));
        case 'no-take': return titles.some(t=>t.includes('Tohum Tutmadı'));
        case 'repro-problem': return titles.some(t=>t.includes('Reprodüktif'));
        case 'embryo-death': return titles.some(t=>t.includes('Embriyonik'));
        case 'postpartum': return titles.some(t=>t.includes('Postpartum'));
        case 'heat-wait': return titles.some(t=>t.includes('Kızgınlık Bekle'));
        case 'problem-cow': return titles.some(t=>t.includes('Sorunlu İnek'));
        case 'dry-now': return titles.some(t=>t.includes('Kuruya Al')&&!t.includes('Alınmadı'));
        case 'dry-risk': return titles.some(t=>t.includes('Risk'));
        case 'calving-soon': return titles.some(t=>t.includes('Buzağılama Yaklaşıyor')||t.includes('Doğum Yakın')||t.includes('DOĞUM ZAMANI'));
        case 'calving-late': return titles.some(t=>t.includes('Tarihi Geçti'));
        default: return true;
      }
    });
  }

  const active = animals.filter(a => a.farm_id === selectedFarmId && !['sold','dead'].includes(a.status));
  const selCount = [...selectedAnimals].filter(id => fa.some(a=>a.id===id)).length;
  const activeFilterCount = [animalFilterStatus!=='all',animalFilterBreed!=='all',animalFilterAlert!=='all'].filter(Boolean).length;

  return `
  <div class="detail-hero" style="background:linear-gradient(135deg,#16a34a,#15803d)">
    <div class="dav">🏭</div>
    <div class="dname">${farm.owner_name || 'İsimsiz'}</div>
    <div class="dphone">${farm.farm_no ? 'No: ' + farm.farm_no : ''}${farm.address ? ' · ' + farm.address : ''}</div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn-p" id="add-animal-btn" style="font-size:12px;padding:9px;flex:2">🐄 Hayvan Ekle</button>
    <button class="btn-sm btn-sm-b" id="toggle-filter-btn" style="padding:9px 12px;font-size:11px;position:relative">
      🔽 Filtre${activeFilterCount?` <span style="background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:9px">${activeFilterCount}</span>`:''}
    </button>
    <button class="btn-sm btn-sm-b" id="excel-import-btn" style="padding:9px 12px;font-size:11px">📋 Toplu Giriş</button>
    <button class="btn-sm" id="bulk-select-btn" style="padding:9px 12px;font-size:11px;background:${bulkMode?'var(--amber-light)':'var(--gray)'};color:${bulkMode?'var(--amber)':'var(--text2)'};border:none;border-radius:var(--radius-sm);cursor:pointer">☑️ Seç</button>
    <button class="btn-sm btn-sm-r" id="delete-farm-btn" style="padding:9px 10px;font-size:11px">🗑</button>
  </div>

  ${bulkMode ? `
  <div class="bulk-bar">
    <input type="checkbox" class="bulk-check" id="select-all-cb" ${selCount===fa.length&&fa.length>0?'checked':''}>
    <div class="bb-count">${selCount > 0 ? selCount+' hayvan seçildi' : 'Hayvan seçin'}</div>
    ${selCount>0?`<button class="btn-sm btn-sm-r" id="delete-selected-btn" style="font-size:11px;padding:6px 12px">🗑 ${selCount} Sil</button>`:''}
    <button class="btn-sm" id="cancel-bulk-btn" style="font-size:11px;padding:6px 10px;background:var(--gray);border:none;border-radius:var(--radius-sm);cursor:pointer">İptal</button>
  </div>` : ''}

  <div style="font-size:12px;color:var(--gray4);margin-bottom:10px">${fa.length} hayvan gösteriliyor · Toplam aktif: ${active.length}${activeFilterCount?` · <span style="color:var(--blue);font-weight:700">${activeFilterCount} filtre aktif</span>`:''}</div>
  ${fa.length ? fa.map(a => buildAnimalCard(a)).join('') : `<div class="empty"><div class="eicon">🐄</div><p>Bu kategoride hayvan yok</p></div>`}`;
}

function buildAnimalCard(a) {
  const farm = farms.find(f => f.id === a.farm_id);
  const alerts = getAnimalAlerts(a);
  const topAlert = alerts[0];
  const statusInfo = ANIMAL_STATUS[a.status] || {label:a.status, icon:'?'};
  const evs = animalEvents.filter(e => e.animal_id === a.id);
  const lastInsem = evs.find(e => e.event_type === 'insemination');
  const lastBirth = evs.find(e => e.event_type === 'birth');
  const isSelected = selectedAnimals.has(a.id);

  return `<div class="animal-card ${topAlert ? 'al-' + topAlert.type : ''} ${isSelected?'selected-card':''}" data-animalid="${a.id}" style="${isSelected?'background:var(--blue-light);':''}">
    ${bulkMode ? `<input type="checkbox" class="bulk-check animal-cb" data-aid="${a.id}" ${isSelected?'checked':''} onclick="event.stopPropagation()">` : ''}
    <div class="ac-icon">${BREED_ICONS[a.breed] || '🐄'}</div>
    <div class="ac-info">
      <div class="ac-tag">${a.ear_tag}</div>
      <div class="ac-meta">
        ${BREEDS[a.breed] || '?'} · Lak:${a.lactation_no || 0} · ${statusInfo.label}
        ${lastInsem ? ' · T:' + fmtDate(lastInsem.event_date) : ''}
        ${lastBirth ? ' · B:' + fmtDate(lastBirth.event_date) : ''}
        ${farm && farmNav === 'farms' ? ' · ' + farm.owner_name : ''}
      </div>
      <div style="font-size:10px;color:var(--gray4)">${a.birth_date ? ageStr(a.birth_date) : ''}</div>
      ${alerts.length ? `<div class="ac-alerts">${alerts.slice(0,2).map(al =>
        `<span class="ac-al ${al.type}">${al.icon} ${al.title}</span>`).join('')}</div>` : ''}
    </div>
  </div>`;
}

function buildAnimalDetail() {
  const a = animals.find(x => x.id === selectedAnimalId);
  if(!a) return '<p style="padding:20px">Hayvan bulunamadı</p>';

  const farm = farms.find(f => f.id === a.farm_id);
  const evs = animalEvents.filter(e => e.animal_id === a.id).sort((x,y) => y.event_date.localeCompare(x.event_date));
  const alerts = getAnimalAlerts(a);
  const statusInfo = ANIMAL_STATUS[a.status] || {label:a.status};

  const lastInsem = evs.find(e => e.event_type === 'insemination');
  const inseminations = evs.filter(e => e.event_type === 'insemination');
  const lastHeat = evs.find(e => e.event_type === 'heat');
  const lastBirth = evs.find(e => e.event_type === 'birth');
  const lastPregCheck = evs.find(e => e.event_type === 'pregnancy_check');
  const lastDryOff = evs.find(e => e.event_type === 'dry_off');

  // Beklenen doğum hesapla
  let expectedBirth = a.expected_birth_date;
  if(!expectedBirth && lastPregCheck && lastInsem) {
    const pd = a.pregnancy_check_day || daysBetween(lastInsem.event_date, lastPregCheck.event_date);
    expectedBirth = addDays(lastPregCheck.event_date, GESTATION_DAYS - pd);
  } else if(!expectedBirth && lastInsem) {
    expectedBirth = addDays(lastInsem.event_date, GESTATION_DAYS);
  }

  // Bir sonraki kızgınlık penceresi — tarih geçmişse bir sonraki döngüye geç
  const heatRef = lastHeat || lastInsem;
  let nextHeatStart = null, nextHeatEnd = null;
  let heatWindowNote = '';
  if(heatRef && (a.status === 'open' || a.status === 'heifer')) {
    let refDate = heatRef.event_date;
    let start = addDays(refDate, HEAT_MIN);
    let end = addDays(refDate, HEAT_MAX);
    const tdStr = today();
    // Pencere geçmişse bir sonraki 21 günlük döngüye geç
    if(end < tdStr) {
      const daysPassed = daysBetween(refDate, tdStr);
      // Kaç 21 günlük döngü geçmiş?
      const cycles = Math.floor(daysPassed / 21);
      const nextRef = addDays(refDate, cycles * 21);
      start = addDays(nextRef, HEAT_MIN);
      end = addDays(nextRef, HEAT_MAX);
      heatWindowNote = `Kızgınlık penceresi beklenen sürede görülmedi · ${cycles}. döngü`;
    }
    nextHeatStart = start;
    nextHeatEnd = end;
  }

  const dSinceInsem = lastInsem ? daysBetween(lastInsem.event_date, today()) : null;
  const dSinceBirth = lastBirth ? daysBetween(lastBirth.event_date, today()) : null;
  const dToCalve = expectedBirth ? daysBetween(today(), expectedBirth) : null;

  return `
  <div class="adh">
    <div style="font-size:36px;margin-bottom:8px">${BREED_ICONS[a.breed] || '🐄'}</div>
    <div class="adh-tag">${a.ear_tag}</div>
    <div class="adh-sub">${BREEDS[a.breed] || '?'} · Laktasyon ${a.lactation_no || 0} · ${statusInfo.label}</div>
    <div class="adh-sub">${farm ? farm.owner_name + ' · ' : ''}${ageStr(a.birth_date)}</div>
  </div>

  ${alerts.length ? `
  <div style="margin-bottom:14px">
    ${alerts.map(al => `
    <div class="al-box ${al.type}">
      <div class="al-icon">${al.icon}</div>
      <div class="al-body">
        <div class="al-title">${al.title}</div>

    <div class="info-box"><div class="info-lbl">🔥 Son Kızgınlık</div><div class="info-val">${lastHeat ? fmtDate(lastHeat.event_date) + ' · ' + daysBetween(lastHeat.event_date, today()) + ' gün önce' : '-'}</div></div>

      </div>
    </div>
    <div class="info-box"><div class="info-lbl">🔬 Gebelik Kontrolü</div><div class="info-val">${(()=>{
      if(!lastPregCheck) return '-';
      if(lastInsem) {
        const pregDay = daysBetween(lastInsem.event_date, lastPregCheck.event_date);
        if(pregDay < 0) return fmtDate(lastPregCheck.event_date) + ' · ⚠️ Tohumlamadan önce!';
        return fmtDate(lastPregCheck.event_date) + ' · Tohumlamadan ' + pregDay + '. gün sonra yapıldı';
      }

    <div class="info-box"><div class="info-lbl">🛑 Kuruya Alma</div><div class="info-val">${lastDryOff ? fmtDate(lastDryOff.event_date) + ' · ' + daysBetween(lastDryOff.event_date, today()) + ' gün önce' : '-'}</div></div>

    const diseases = evs.filter(e => e.event_type === 'disease');

    const past = diseases.filter(e => e.disease_status === 'recovered' || e.disease_status === 'died');

      const ds = DISEASE_STATUS[e.disease_status||'recovered'];
      return `<div class="disease-item ${e.disease_status}">
        <div class="di-icon">📋</div>
        <div class="di-info">
          <div class="di-name">${e.disease_name||e.notes||'Hastalık'}</div>
          <div class="di-meta">${fmtDate(e.event_date)}${e.treatment?' · Tedavi: '+e.treatment:''}</div>
        </div>
        <div class="di-status ${e.disease_status}">${ds?.label||''}</div>
      </div>`;
    }).join('')}`;
  })()}

  <div class="sec-title">📋 Olay Geçmişi</div>
  ${evs.filter(e=>e.event_type!=='disease').length ? evs.filter(e=>e.event_type!=='disease').map(e => {
    const et = EVENT_TYPES[e.event_type] || {label:e.event_type, icon:'📝', color:'gray'};
    const dotColors = {red:'var(--red)', amber:'var(--amber)', green:'var(--green)', blue:'var(--blue)', purple:'var(--purple)', gray:'var(--gray3)'};
    return `<div class="tl-item">
      <div class="tl-dot" style="background:${dotColors[et.color] || 'var(--gray3)'}"></div>
      <div class="tl-info">
        <div class="tl-type">${et.icon} ${et.label}${e.event_day ? ' — ' + e.event_day + '. gün' : ''}</div>
        <div class="tl-date">${fmtDate(e.event_date)}${e.notes ? ' · ' + e.notes : ''}</div>
      </div>
    </div>`;
  }).join('') : `<div class="empty"><p>Henüz olay kaydı yok</p></div>`}`;
}

window.startVoiceInput = function() {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Sesli giriş için Chrome kullanın'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const r = new SR(); r.lang = 'tr-TR'; r.continuous = false; r.interimResults = false;
  r.onstart = () => toast('🎤 Dinleniyor...');
  r.onresult = (e) => {
    const t = e.results[0][0].transcript.toUpperCase().replace(/\s/g,'');
    const inp = document.getElementById('an-tag');
    if(inp) inp.value = fmtEarTag(t);
    toast('✅ Tanındı: ' + t);
  };
  r.onerror = () => toast('❌ Ses tanınamadı');
  r.start();
};

window.toggleAnimalFields = function(status) {
  const allGroups = ['open-fields','preg-fields','dry-fields','heifer-fields','inactive-fields'];
  allGroups.forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });

    open: 'open-fields',
    pregnant: 'preg-fields',
    dry: 'dry-fields',
    heifer: 'heifer-fields',
    sold: 'inactive-fields',
    dead: 'inactive-fields',
  };
  const target = document.getElementById(map[status]);
  if(target) target.style.display = '';
};

// Açık hayvanda doğumdan geçen gün
window.calcDaysSinceBirth = function(val) {
  const el = document.getElementById('days-since-birth');
  if(!el || !val) return;
  const d = daysBetween(val, today());
  el.textContent = d >= 0 ? `Doğumdan ${d} gün geçmiş` : '';
};

// Gebe hayvanda beklenen doğum hesapla
window.calcExpectedBirth = function() {
  const insemDate = document.getElementById('an-insem')?.value;
  const pregChkDate = document.getElementById('an-pregchk')?.value;
  const preview = document.getElementById('expected-birth-preview');
  const valEl = document.getElementById('expected-birth-val');
  const daysEl = document.getElementById('days-to-calve');
  if(!preview || !valEl || !daysEl) return;

  let expectedBirth = null;
  let info = '';

  if(insemDate && pregChkDate) {
    const pregDay = daysBetween(insemDate, pregChkDate);
    const remaining = GESTATION_DAYS - pregDay;
    expectedBirth = addDays(pregChkDate, remaining);
    info = `Tohumlamadan ${pregDay}. günde teyit · Kalan ${remaining} gün`;
  } else if(insemDate) {
    expectedBirth = addDays(insemDate, GESTATION_DAYS);
    info = `Tohumlama + ${GESTATION_DAYS} gün`;
  }

  if(expectedBirth) {
    preview.style.display = '';
    valEl.textContent = fmtDate(expectedBirth);
    const dToCalve = daysBetween(today(), expectedBirth);
    daysEl.textContent = info + (dToCalve >= 0 ? ` · Doğuma ${dToCalve} gün kaldı` : ` · ${Math.abs(dToCalve)} gün geçti`);
    daysEl.style.color = dToCalve < 0 ? 'var(--red)' : dToCalve < 60 ? 'var(--amber)' : 'var(--gray4)';
  } else {
    preview.style.display = 'none';
  }
};

// Kuru hayvanda tahmini doğum aralığı
window.calcDryBirth = function() {
  const insemDate = document.getElementById('an-insem')?.value;
  const pregChkDate = document.getElementById('an-pregchk')?.value;
  const preview = document.getElementById('dry-birth-preview');
  const valEl = document.getElementById('dry-birth-val');
  const infoEl = document.getElementById('dry-calve-info');
  if(!preview || !valEl || !infoEl) return;

  let expectedBirth = null;
  let calcInfo = '';

  if(insemDate && pregChkDate) {
    const pregDay = daysBetween(insemDate, pregChkDate);
    const remaining = GESTATION_DAYS - pregDay;
    expectedBirth = addDays(pregChkDate, remaining);
    calcInfo = `Tohumlamadan ${pregDay}. günde teyit · Hassas hesaplama`;
  } else if(insemDate) {
    expectedBirth = addDays(insemDate, GESTATION_DAYS);
    calcInfo = `Tohumlama + ${GESTATION_DAYS} gün`;
  }

  if(expectedBirth) {
    // ±7 günlük aralık göster
    const earlyDate = addDays(expectedBirth, -7);
    const lateDate = addDays(expectedBirth, 7);
    preview.style.display = '';
    valEl.textContent = `${fmtDate(earlyDate)} — ${fmtDate(lateDate)}`;
    const dToCalve = daysBetween(today(), expectedBirth);
    infoEl.textContent = calcInfo + (dToCalve >= 0 ? ` · Doğuma yaklaşık ${dToCalve} gün kaldı` : ` · ${Math.abs(dToCalve)} gün geçti!`);
    infoEl.style.color = dToCalve < 14 ? 'var(--red)' : dToCalve < 60 ? 'var(--amber)' : 'var(--gray4)';
  } else {
    preview.style.display = 'none';
  }
};

// Düvede yaş hesapla
window.calcHeiferAge = function(val) {
  const el = document.getElementById('heifer-age');
  if(!el || !val) return;
  const d = daysBetween(val, today());
  const months = Math.floor(d / 30);
  let msg = `${months} aylık`;
  if(months >= 12) msg += ' — Tohumlama zamanı! 🔔';
  else if(months >= 10) msg += ' — Tohumlama yaklaşıyor 📅';
  else msg += ' — Henüz erken';
  el.textContent = msg;
  el.style.color = months >= 12 ? 'var(--amber)' : months >= 10 ? 'var(--blue)' : 'var(--gray4)';
};

window.filterDiseaseList = function(val) {
  const q = val.toLowerCase();
  const dd = document.getElementById('disease-dropdown');
  if(!dd) return;
  const items = dd.querySelectorAll('.dd-item');
  const cats = dd.querySelectorAll('.dd-cat');
  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  // Boş kategori başlıklarını gizle
  cats.forEach(cat => {
    let next = cat.nextElementSibling;
    let hasVisible = false;
    while(next && !next.classList.contains('dd-cat')) {
      if(next.style.display !== 'none') hasVisible = true;
      next = next.nextElementSibling;
    }
    cat.style.display = hasVisible ? '' : 'none';
  });
};

window.selectDisease = function(name) {
  const inp = document.getElementById('disease-search-inp');
  const dd = document.getElementById('disease-dropdown');
  if(inp) inp.value = name;
  if(dd) dd.style.display = 'none';
};

function bindFarmEvents() {
  // Navigasyon
  document.querySelectorAll('[data-farmid]').forEach(el => el.addEventListener('click', () => {
    selectedFarmId = el.dataset.farmid;

    if(e.target.classList.contains('animal-cb')) return;
    if(bulkMode) {
      const aid = el.dataset.animalid;
      if(selectedAnimals.has(aid)) selectedAnimals.delete(aid);
      else selectedAnimals.add(aid);
      renderFarm(); return;
    }
    selectedAnimalId = el.dataset.animalid;
    farmNav = 'animal-detail';
    renderFarm();
  }));

  });
  document.getElementById('filter-apply-btn')?.addEventListener('click', () => {
    modal = null; renderFarm();
  });
  document.getElementById('filter-clear-btn')?.addEventListener('click', () => {
    animalFilterStatus='all'; animalFilterBreed='all'; animalFilterAlert='all';
    renderFarm();
  });
  document.querySelectorAll('[data-alert]').forEach(c => c.addEventListener('click', () => {
    animalFilterAlert = c.dataset.alert;
    if(modal === 'filter-animals') renderFarm();
    else renderFarm();
  }));
  document.querySelectorAll('[data-breed]').forEach(c => c.addEventListener('click', () => {
    animalFilterBreed = c.dataset.breed;
    if(modal === 'filter-animals') renderFarm();
    else renderFarm();
  }));
  document.querySelectorAll('[data-astatus]').forEach(c => c.addEventListener('click', () => {
    animalFilterStatus = c.dataset.astatus;
    if(modal === 'filter-animals') renderFarm();
    else renderFarm();
  }));

  // Butonlar
  document.getElementById('add-farm-btn')?.addEventListener('click', () => { modal = 'add-farm'; renderFarm(); });
  document.getElementById('add-animal-btn')?.addEventListener('click', () => { modal = 'add-animal'; renderFarm(); });
  document.getElementById('edit-animal-btn')?.addEventListener('click', () => { modal = 'edit-animal'; renderFarm(); });
  // Hızlı olay butonları
  document.querySelectorAll('.quick-ev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const evtype = btn.dataset.evtype;
      if(evtype === 'disease') { modal = 'add-disease'; renderFarm(); return; }
      modal = 'add-event';
      // Seçili olay tipini kaydet
      window._quickEvType = evtype;
      renderFarm();
    });
  });

  // Hastalık butonu (eski)
  document.getElementById('add-disease-btn')?.addEventListener('click', () => { modal = 'add-disease'; renderFarm(); });

  // Olay ekle butonu (eski uyumluluk)
  document.getElementById('add-event-btn')?.addEventListener('click', () => { modal = 'add-event'; renderFarm(); });
  document.getElementById('excel-import-btn')?.addEventListener('click', () => { modal = 'excel-import'; renderFarm(); });

  document.getElementById('farm-search-btn')?.addEventListener('click', () => {
    const b = document.getElementById('farm-search-bar');
    if(b) b.style.display = b.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('farm-name-search')?.addEventListener('input', e => {
    farmSearch = e.target.value; renderFarm();
  });
  document.querySelectorAll('[data-farmfilter]').forEach(c => c.addEventListener('click', () => {
    farmFilter = c.dataset.farmfilter; renderFarm();
  }));
  document.getElementById('animal-search-input')?.addEventListener('input', e => {
    animalSearch = e.target.value; renderFarm();
  });

  // Hastalık butonu
  document.getElementById('add-disease-btn')?.addEventListener('click', () => { modal = 'add-disease'; renderFarm(); });

  // Hastalık kaydet
  document.getElementById('save-disease-btn')?.addEventListener('click', async () => {
    const name = document.getElementById('disease-search-inp')?.value.trim();
    const date = document.getElementById('ev-date')?.value;
    const status = document.getElementById('disease-status-sel')?.value || 'active';
    const treatment = document.getElementById('disease-treatment')?.value.trim() || '';
    const notes = document.getElementById('ev-notes')?.value.trim() || '';

    if(!date) { alert('Tarih zorunludur!'); return; }
    await addAnimalEvent({
      animal_id: selectedAnimalId,
      event_type: 'disease',
      event_date: date,
      event_day: null,
      disease_name: name,
      disease_status: status,
      treatment,
      notes,
    });
    modal = null; toast('✅ Hastalık kaydedildi'); renderFarm();

  // Toplu seçim
  document.getElementById('bulk-select-btn')?.addEventListener('click', () => {
    bulkMode = !bulkMode; selectedAnimals.clear(); renderFarm();
  });
  document.getElementById('cancel-bulk-btn')?.addEventListener('click', () => {
    bulkMode = false; selectedAnimals.clear(); renderFarm();
  });
  document.getElementById('select-all-cb')?.addEventListener('change', (e) => {
    let fa = animals.filter(a => a.farm_id === selectedFarmId);
    if(animalFilterBreed !== 'all') fa = fa.filter(a => a.breed === animalFilterBreed);
    if(animalFilterStatus !== 'all') fa = fa.filter(a => a.status === animalFilterStatus);

    else selectedAnimals.clear();
    renderFarm();
  });
  document.querySelectorAll('.animal-cb').forEach(cb => cb.addEventListener('change', (e) => {

    const o = document.getElementById('fm-owner')?.value.trim();

      owner_name: o,
      farm_no: document.getElementById('fm-no')?.value.trim() || null,

  const saveAnimalFn = async (isEdit) => {
    const tag = document.getElementById('an-tag')?.value.trim();
    if(!tag) { alert('Küpe no zorunludur!'); return; }

    // KRİTİK: Yeni hayvan eklerken mutlaka işletme seçili olmalı

    const birthDate = document.getElementById('an-birth')?.value || null;
    const notes = document.getElementById('an-notes')?.value.trim() || null;
    const breed = document.getElementById('an-breed')?.value || 'holstein';

    // Laktasyon — düvede 0, diğerlerinde girilen değer
    const lacEl = document.getElementById('an-lac');
    const lactation = status === 'heifer' ? 0 : (parseInt(lacEl?.value) || 0);

    // Durum bazlı alanlar
    let insemDate = null, heatDate = null, lastBirthDate = null;
    let pregChkDate = null, pregDay = null, expectedBirth = null;

    if(status === 'open') {
      insemDate = document.getElementById('an-insem')?.value || null;
      heatDate = document.getElementById('an-heat')?.value || null;
      lastBirthDate = document.getElementById('an-lastbirth')?.value || null;
    }

    if(status === 'pregnant') {
      insemDate = document.getElementById('an-insem')?.value || null;
      pregChkDate = document.getElementById('an-pregchk')?.value || null;
      // Teyit günü otomatik hesapla
      if(insemDate && pregChkDate) {
        pregDay = daysBetween(insemDate, pregChkDate);
        expectedBirth = addDays(pregChkDate, GESTATION_DAYS - pregDay);
      } else if(insemDate) {
        expectedBirth = addDays(insemDate, GESTATION_DAYS);
      }
    }

    if(status === 'dry') {
      insemDate = document.getElementById('an-insem')?.value || null;
      pregChkDate = document.getElementById('an-pregchk')?.value || null;
      // Kuru hayvan için beklenen doğum hesapla
      if(insemDate && pregChkDate) {
        pregDay = daysBetween(insemDate, pregChkDate);
        expectedBirth = addDays(pregChkDate, GESTATION_DAYS - pregDay);
      } else if(insemDate) {
        expectedBirth = addDays(insemDate, GESTATION_DAYS);
      }
    }

    const data = {
      ear_tag: fmtEarTag(tag),
      breed,
      birth_date: status === 'heifer' ? birthDate : birthDate, // düvede hayvanın kendi doğum tarihi
      lactation_no: lactation,
      status,
      notes,
      last_insemination_date: insemDate,
      last_heat_date: heatDate,
      last_birth_date: lastBirthDate,
      pregnancy_check_date: pregChkDate,
      pregnancy_check_day: pregDay,
      expected_birth_date: expectedBirth,
    };

    if(isEdit) {
      await updateAnimal(selectedAnimalId, data);
    } else {
      const saved = await addAnimal({...data, farm_id: selectedFarmId});
      if(saved) {
        // Olayları kaydet
        if(insemDate) await addAnimalEvent({animal_id:saved.id, event_type:'insemination', event_date:insemDate, event_day:null, notes:''});
        if(heatDate) await addAnimalEvent({animal_id:saved.id, event_type:'heat', event_date:heatDate, event_day:null, notes:''});
        if(lastBirthDate) await addAnimalEvent({animal_id:saved.id, event_type:'birth', event_date:lastBirthDate, event_day:null, notes:''});
        if(pregChkDate) await addAnimalEvent({animal_id:saved.id, event_type:'pregnancy_check', event_date:pregChkDate, event_day:pregDay, notes:''});
      }
    }

    modal = null;
    toast('✅ ' + (isEdit ? 'Güncellendi' : 'Hayvan eklendi'));
    await loadFarmData();
    render();
    renderFarm();
  };

  document.getElementById('save-animal-btn')?.addEventListener('click', () => saveAnimalFn(false));
  document.getElementById('update-animal-btn')?.addEventListener('click', () => saveAnimalFn(true));

  // ── Olay Kaydet ──
  document.getElementById('save-event-btn')?.addEventListener('click', async () => {
    const type = document.getElementById('ev-type')?.value;
    const date = document.getElementById('ev-date')?.value;
    if(!date) { alert('Tarih zorunludur!'); return; }
    const day = parseInt(document.getElementById('ev-day')?.value) || null;
    const notes = document.getElementById('ev-notes')?.value.trim() || '';

    const a = animals.find(x => x.id === selectedAnimalId);
    if(!a) return;

    // Duruma göre hayvanı güncelle
    const updates = {};

    if(type === 'insemination') {
      const prevInsems = animalEvents.filter(e => e.animal_id === a.id && e.event_type === 'insemination').length;
      const insemNo = prevInsems + 1;
      const bullName = document.getElementById('ev-bull-name')?.value.trim() || '';
      const insemLabel = insemNo === 1 ? 'İlk tohumlama' : insemNo + '. tohumlama (tekrar)';
      const insemNote = `${insemLabel}${bullName ? ' — Boğa: ' + bullName : ''}${notes ? ' — ' + notes : ''}`;
      updates.last_insemination_date = date;
      if(a.status === 'pregnant') updates.status = 'open';
      await addAnimalEvent({
        animal_id: selectedAnimalId, event_type: type,
        event_date: date, event_day: null, notes: insemNote,
      });
      if(Object.keys(updates).length) await updateAnimal(selectedAnimalId, updates);
      modal = null;
      toast('✅ ' + insemLabel + ' kaydedildi');
      await loadFarmData(); renderFarm();
      return;
    }

    if(type === 'heat') {
      updates.last_heat_date = date;
      // Eğer tohumlama sonrası kızgınlık ise hayvan open'a düş
      if(a.status === 'pregnant') {
        updates.status = 'open';
        updates.expected_birth_date = null;
        updates.pregnancy_check_date = null;
        updates.pregnancy_check_day = null;
      }
    }

    if(type === 'pregnancy_check') {
      // Gebe teyidi
      const lastInsemEv = animalEvents.find(e => e.animal_id === a.id && e.event_type === 'insemination');
      let expectedBirth = null;
      if(day && lastInsemEv) {
        expectedBirth = addDays(date, GESTATION_DAYS - day);
      } else if(lastInsemEv) {
        expectedBirth = addDays(lastInsemEv.event_date, GESTATION_DAYS);
      }
      updates.status = 'pregnant';
      updates.pregnancy_check_date = date;
      updates.pregnancy_check_day = day;
      updates.expected_birth_date = expectedBirth;
    }

    if(type === 'birth') {
      // Doğum: açık al, laktasyon +1 (düve ise 0→1, inek ise mevcut+1)
      const currentLac = a.lactation_no || 0;
      const newLac = a.status === 'heifer' ? 1 : currentLac + 1;
      updates.status = 'open';
      updates.lactation_no = newLac;
      updates.last_birth_date = date;
      updates.expected_birth_date = null;
      updates.pregnancy_check_date = null;
      updates.pregnancy_check_day = null;
    }

    if(type === 'dry_off') {
      updates.status = 'dry';
    }

    if(Object.keys(updates).length) {
      await updateAnimal(selectedAnimalId, updates);
    }

    await addAnimalEvent({
      animal_id: selectedAnimalId,
      event_type: type,
      event_date: date,
      event_day: day,
      notes,
    });

    modal = null;
    toast('✅ Olay kaydedildi');
    // Anlık güncelleme — algoritma yeniden çalışsın
    await loadFarmData();
    render();
    renderFarm();
  });

  // ── Kızgınlık takip ──
  document.getElementById('save-heat-followup-btn')?.addEventListener('click', async () => {
    const date = document.getElementById('heat-date')?.value;
    const action = document.getElementById('heat-action')?.value;
    const notes = document.getElementById('heat-notes')?.value.trim() || '';

    if(!date) { alert('Tarih zorunludur!'); return; }

    const a = animals.find(x => x.id === selectedAnimalId);
    if(!a) return;

    // Kızgınlık olayı kaydet
    await addAnimalEvent({animal_id:selectedAnimalId, event_type:'heat', event_date:date, event_day:null, notes});

    if(action === 'reinsem') {
      // Tekrar tohumlama — tohumlama olayı da ekle
      await addAnimalEvent({animal_id:selectedAnimalId, event_type:'insemination', event_date:date, event_day:null, notes:'Tekrar tohumlama'});
      await updateAnimal(selectedAnimalId, {last_insemination_date:date, last_heat_date:date});
    } else if(action === 'check') {
      // Gebelik muayenesi yapılacak — hayvanı açık al
      await updateAnimal(selectedAnimalId, {
        status:'open', last_heat_date:date,
        expected_birth_date:null, pregnancy_check_date:null, pregnancy_check_day:null
      });
    } else {
      // Gözlem — sadece kızgınlık tarihini güncelle
      await updateAnimal(selectedAnimalId, {last_heat_date:date});
    }

    modal = null;
    toast('✅ Kızgınlık kaydedildi');
    renderFarm();
  });

  // ── Excel import ──
  document.getElementById('excel-file')?.addEventListener('change', async (e) => {
    const file = e.target.files[0]; if(!file) return;
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim());
    const prev = document.getElementById('excel-preview');
    if(prev) prev.innerHTML = `<div style="font-size:11px;color:var(--gray4);margin-bottom:6px">${lines.length} satır bulundu</div>` +
      lines.slice(0,5).map(l => `<div style="font-size:10px;padding:3px 0;border-bottom:1px solid var(--gray2)">${l}</div>`).join('');
  });

  document.getElementById('import-excel-btn')?.addEventListener('click', async () => {
    // KRİTİK: Her zaman bir işletme seçili olmalı
    if(!selectedFarmId) {
      alert('⚠️ Lütfen önce bir işletme seçin!\n\nCSV yüklemesi mutlaka bir işletmenin içinden yapılmalıdır.');
      return;
    }
    const file = document.getElementById('excel-file')?.files[0];
    if(!file) { alert('Dosya seçin!'); return; }
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim()).slice(1); // başlık satırını atla
    let count = 0, errors = 0;
    for(const line of lines) {
      // CSV parse (tırnak içi virgülleri dikkate al)
      const c = line.match(/(".*?"|[^,]+)(?=,|$)/g)?.map(x=>x.trim().replace(/^"|"$/g,'')) || line.split(',').map(x=>x.trim());
      if(!c[0]) continue;
      try {
        const insemDate   = c[5]||null;
        const pregChkDate = c[6]||null;
        const lastBirth   = c[7]||null;
        const heatDate    = c[8]||null;
        const status      = c[4]?.toLowerCase()||'open';
        const lac         = status==='heifer'?0:parseInt(c[3])||0;

        // Beklenen doğum hesapla
        let expectedBirth=null, pregDay=null;
        if(insemDate&&pregChkDate) {
          pregDay=daysBetween(insemDate,pregChkDate);
          expectedBirth=addDays(pregChkDate,GESTATION_DAYS-pregDay);
        } else if(insemDate&&['pregnant','dry'].includes(status)) {
          expectedBirth=addDays(insemDate,GESTATION_DAYS);
        }

        const saved = await addAnimal({
          farm_id:selectedFarmId,
          ear_tag:fmtEarTag(c[0]),
          breed:c[1]?.toLowerCase()||'holstein',
          birth_date:c[2]||null,
          lactation_no:lac,
          status,
          last_insemination_date:insemDate,
          pregnancy_check_date:pregChkDate,
          pregnancy_check_day:pregDay,
          last_birth_date:lastBirth,
          last_heat_date:heatDate,
          expected_birth_date:expectedBirth,
          notes:c[9]||null,
        });

        if(saved) {
          // Olayları kaydet
          if(insemDate) await addAnimalEvent({animal_id:saved.id,event_type:'insemination',event_date:insemDate,event_day:null,notes:''});
          if(pregChkDate) await addAnimalEvent({animal_id:saved.id,event_type:'pregnancy_check',event_date:pregChkDate,event_day:pregDay,notes:''});
          if(lastBirth) await addAnimalEvent({animal_id:saved.id,event_type:'birth',event_date:lastBirth,event_day:null,notes:''});
          if(heatDate) await addAnimalEvent({animal_id:saved.id,event_type:'heat',event_date:heatDate,event_day:null,notes:''});
          count++;
        }
      } catch(e) { console.error('Satır hatası:',e,c); errors++; }
    }
    modal=null;
    toast(`✅ ${count} hayvan aktarıldı${errors?` (${errors} hata)`:''}`);
    renderFarm();
  });
}

// ─── FARM RENDER ─────────────────────────────────────────────
function renderFarm() {
  const app = document.getElementById('farm-module');
  if(!app) return;
  const farmModals = ['add-farm','add-animal','edit-animal','add-event','excel-import','heat-insem-followup','filter-animals','add-disease'];
  const fm = modal && farmModals.includes(modal) ? buildFarmModal() : '';
  app.innerHTML = buildFarmModule() + fm;
  bindFarmEvents();
}

// ─── INIT ─────────────────────────────────────────────────────
if(currentUser) loadAll(); else render();
</script>
</body>
